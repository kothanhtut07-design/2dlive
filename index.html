<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: transparent; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        .container {
            display: flex;
            flex-direction: column;
            gap: 70px; /* အဖြူကွက်ကြား အကွာအဝေး */
            padding-top: 55px;
            align-items: center;
        }
        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 380px;
        }
        .title { font-size: 22px; color: #333; font-weight: bold; margin-bottom: 5px; }
        .val { font-size: 85px; font-weight: bold; line-height: 1; }
    </style>
    <script>
        const sheetID = '1WTAqnW15uaT_Cr-9pcr8zTlBxCM6WXm3yV2dK4Iymlg';
        const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;
        async function update() {
            try {
                const r = await fetch(csvURL + '&c=' + Date.now());
                const t = await r.text();
                // Google Sheet error စာသားတွေကို ဖယ်ထုတ်ပြီး ဂဏန်းသက်သက်ပဲ ယူတာပါ
                const rows = t.split('\n').filter(row => row.trim() !== "").map(v => v.replace(/"/g, '').trim());
                if (rows.length > 1) {
                    const data = rows.slice(1); // Header ဖယ်လိုက်တာ
                    document.getElementById('v1').innerText = data[0] || '---';
                    document.getElementById('v2').innerText = data[1] || '--';
                    document.getElementById('v3').innerText = data[2] || '--';
                }
            } catch (e) { console.error(e); }
        }
        setInterval(update, 3000);
        update();
    </script>
</head>
<body>
    <div class="container">
        <div class="item">
            <div class="title" style="color: #ffffff; text-shadow: 1px 1px 2px #000;">ဟော့ထိပ်စီး</div>
            <div id="v1" class="val" style="color: #ffffff; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);">---</div>
        </div>
        <div class="item">
            <div class="title">11:00AM</div>
            <div id="v2" class="val" style="color: #ffff00; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);">--</div>
        </div>
        <div class="item">
            <div class="title">3:00PM</div>
            <div id="v3" class="val" style="color: #00ffff; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);">--</div>
        </div>
    </div>
</body>
</html>
