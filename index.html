<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: transparent; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        .container {
            display: flex;
            flex-direction: column;
            gap: 75px; /* အကွာအဝေး ညှိရန် */
            padding-top: 60px;
            align-items: center;
        }
        .item { display: flex; flex-direction: column; align-items: center; width: 400px; }
        .title { font-size: 24px; color: #333; font-weight: bold; margin-bottom: 5px; }
        .val { font-size: 90px; font-weight: bold; line-height: 1; }
    </style>
    <script>
        // Google Sheet ID ကို CSV ပုံစံဖြင့် တိုက်ရိုက်ဖတ်ရန် ပြင်ဆင်ထားသည်
        const sheetID = '1WTAqnW15uaT_Cr-9pcr8zTlBxCM6WXm3yV2dK4Iymlg';
        const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv`;

        async function update() {
            try {
                const r = await fetch(csvURL + '&cache=' + Date.now());
                const t = await r.text();
                // စာကြောင်းများကို ခွဲထုတ်ပြီး ဂဏန်းသက်သက်ပဲ ယူသည်
                const rows = t.split('\n').map(row => row.split(',')[0].replace(/"/g, '').trim());
                
                if (rows.length >= 1) {
                    document.getElementById('v1').innerText = rows[0] || '---';
                    document.getElementById('v2').innerText = rows[1] || '--';
                    document.getElementById('v3').innerText = rows[2] || '--';
                }
            } catch (e) { console.error("Error: ", e); }
        }
        setInterval(update, 3000);
        update();
    </script>
</head>
<body>
    <div class="container">
        <div class="item">
            <div class="title" style="color: #ffffff; text-shadow: 1px 1px 3px #000;">ဟော့ထိပ်စီး</div>
            <div id="v1" class="val" style="color: #ffffff; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);">---</div>
        </div>
        <div class="item">
            <div class="title" style="color: #333;">11:00AM</div>
            <div id="v2" class="val" style="color: #ffff00; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);">--</div>
        </div>
        <div class="item">
            <div class="title" style="color: #333;">3:00PM</div>
            <div id="v3" class="val" style="color: #00ffff; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);">--</div>
        </div>
    </div>
</body>
</html>
